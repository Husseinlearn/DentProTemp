services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    container_name: dentpro_web
    restart: unless-stopped
    env_file: .env
    command: ["/app/entrypoint.sh", "gunicorn"]
    # حذفنا الـ ports من هنا لمنع الوصول المباشر لـ Django من خارج السيرفر
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dentpro_network

  nginx:
    image: nginx:1.25-alpine
    container_name: dentpro_nginx
    restart: unless-stopped
    ports:
      - "80:80"        # بورت HTTP العادي للإنتاج والتجربة
      - "443:443"      # بورت HTTPS (سنجهزه لـ AWS لاحقاً)
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d # ربط ملفات الإعدادات
      - static_volume:/app/staticfiles    # قراءة الملفات الثابتة من الفوليوم المشترك
      - media_volume:/app/media          # قراءة ملفات الميديا
    depends_on:
      - web
    networks:
      - dentpro_network

  db:
    image: postgres:17-alpine
    container_name: dentpro_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentpro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "5433:5432"
    networks:
      - dentpro_network

volumes:
  db_data:
  static_volume:
  media_volume:

networks:
  dentpro_network:
    driver: bridge